llm:
  provider: deepseek
  model: deepseek-chat
  api_key_env: DEEPSEEK_API_KEY

embedding:
  provider: huggingface
  model: BAAI/bge-small-zh-v1.5
  device: cpu

knowledge_base:
  chroma_persist_dir: ./data/chroma
  chunk_size: 1000
  chunk_overlap: 200
  default_top_k: 5

server:
  host: 0.0.0.0
  port: 8020

persistence:
  sqlite_path: ./data/sessions.db
  checkpoint_dir: ./data/checkpoints

skills:
  sources:
    - ./skills

workflows:
  directory: ./workflows
  default: process-optimization
