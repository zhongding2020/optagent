services:
  optagent-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optagent
    ports:
      - "8020:8020"
    volumes:
      - optagent-data:/app/backend/data
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
    restart: unless-stopped

volumes:
  optagent-data:
